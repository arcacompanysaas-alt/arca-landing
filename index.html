<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCA — Propostas Profissionais em 3 Minutos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      overflow-x: hidden;
    }
    button { font-family: inherit; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,71,224,0.25); border-radius: 3px; }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components (order matters — tokens first) -->
  <script type="text/babel" src="arca-tokens.jsx"></script>
  <script type="text/babel" src="arca-nav.jsx"></script>
  <script type="text/babel" src="arca-hero.jsx"></script>
  <script type="text/babel" src="arca-sections.jsx"></script>
  <script type="text/babel" src="arca-pricing.jsx"></script>
  <script type="text/babel" src="arca-bottom.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "moderno",
  "darkMode": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [billing, setBilling]   = useState('monthly');

  const variant  = t.variant  || 'moderno';
  const darkMode = t.darkMode || false;
  const theme    = getTheme(variant, darkMode);

  // Sync body background for smooth transitions
  useEffect(() => {
    document.body.style.background   = theme.bg;
    document.body.style.transition   = 'background 0.4s ease';
    document.body.style.color        = theme.text;
  }, [theme.bg, theme.text]);

  return (
    <>
      {/* ── Tweaks Panel ── */}
      <TweaksPanel>
        <TweakSection label="Tema" />
        <TweakToggle
          label="Modo escuro"
          value={darkMode}
          onChange={v => setTweak('darkMode', v)}
        />
        <TweakSection label="Preços" />
        <TweakRadio
          label="Cobrança"
          value={billing}
          options={['monthly', 'annual']}
          onChange={v => setBilling(v)}
        />
      </TweaksPanel>

      {/* ── Page ── */}
      <div style={{
        background: theme.bg,
        color: theme.text,
        transition: 'background 0.4s ease, color 0.4s ease',
        minHeight: '100vh',
      }}>
        <Navbar
          t={theme}
          variant={variant}
          darkMode={darkMode}
          setDarkMode={v => setTweak('darkMode', v)}
        />

        <HeroSection     t={theme} variant={variant} />
        <FeaturesSection t={theme} />
        <HowItWorksSection t={theme} />
        <PricingSection  t={theme} billing={billing} setBilling={setBilling} />
        <CTASection      t={theme} />
        <Footer          t={theme} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
